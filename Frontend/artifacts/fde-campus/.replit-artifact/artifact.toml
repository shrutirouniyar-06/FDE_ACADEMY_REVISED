kind = "web"
previewPath = "/"
title = "FDE Campus"
version = "1.0.0"
id = "artifacts/fde-campus"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23623

[services.development]
run = "pnpm --filter @workspace/fde-campus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fde-campus", "run", "build" ]
serve = "static"
publicDir = "artifacts/fde-campus/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23623"
BASE_PATH = "/"
